    <script>
        function copyGameId(buttonElement) {
            const gameId = buttonElement.getAttribute('data-id');
            const originalName = buttonElement.getAttribute('data-name');
            const textSpan = buttonElement.querySelector('.btn-text');

            navigator.clipboard.writeText(gameId).then(() => {
                textSpan.innerText = "ID Copied!";
                buttonElement.style.borderColor = "#10b981"; 
                
                setTimeout(() => {
                    textSpan.innerText = originalName;
                    buttonElement.style.borderColor = "";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy ID: ', err);
            });
        }
    </script>
