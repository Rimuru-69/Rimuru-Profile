<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimuru Tempest // Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="background-overlay"></div>
    <img class="bg-media" src="profile.gif" alt="Rimuru Background">

    <div class="profile-card">
        
        <div class="banner-container">
            <img src="banner.gif" alt="Rimuru Banner" class="banner-img">
        </div>

        <div class="avatar-container">
            <img src="mainprofile.gif" alt="Rimuru Avatar" class="avatar-img">
        </div>

        <div class="profile-info">
            <h1 class="username">Rimuru Tempest <i class="fa-solid fa-circle-check verified-badge"></i></h1>
            <p class="subtitle">Supreme Demon Lord</p>
            <p class="bio">"I'm not a bad slime, you know!"<br>Jura Tempest Federation | Ultimate Skill: Raphael</p>
        </div>

        <div class="links-container">
            <a href="#" class="link-btn"><i class="fa-brands fa-roblox"></i> Roblox</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-gamepad"></i> Mobile Legends</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-burst"></i> Genshin Impact</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-shuttle-space"></i> Honkai: Star Rail</a>
        </div>

        <div class="footer-status">
            <span><i class="fa-solid fa-wand-magic-sparkles"></i> Great Sage is executing calculations...</span>
        </div>

    </div>

</body>
</html>
